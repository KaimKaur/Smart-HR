# Smart HR — local development (hot reload)
# Usage: cp .env.example .env && docker compose up --build

services:
  db:
    image: postgres:16-alpine
    container_name: smart-hr-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smart_hr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_hr_dev}
      POSTGRES_DB: ${POSTGRES_DB:-smart_hr}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-smart_hr} -d ${POSTGRES_DB:-smart_hr}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: smart-hr-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smart_hr}:${POSTGRES_PASSWORD:-smart_hr_dev}@db:5432/${POSTGRES_DB:-smart_hr}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    command:
      [
        "uvicorn",
        "app.main:app",
        "--reload",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
      target: deps
    container_name: smart-hr-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]

volumes:
  postgres-data:
  frontend-node-modules:
